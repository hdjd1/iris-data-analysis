<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 智能文件整理器</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #24292e; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .btn { display: inline-block; padding: 6px 12px; font-size: 14px; font-weight: 600; line-height: 20px; color: #24292e; background-color: #fafbfc; border: 1px solid rgba(27,31,35,0.15); border-radius: 6px; text-decoration: none; margin-right: 10px; }
        .btn-primary { color: #fff; background-color: #2ea44f; border-color: rgba(27,31,35,0.1); }
        code { background-color: rgba(27,31,35,0.05); padding: 0.2em 0.4em; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🚀 Python 智能文件整理器</h1>
    <p>这是一个基于 Python 3.14+ 标准库开发的轻量级工具，无需安装任何第三方依赖，即可自动将混乱的文件夹按文件类型归类。</p>
    
    <div style="margin: 20px 0;">
        <a href="main.py" class="btn btn-primary">查看源代码 (main.py)</a>
        <a href="https://github.com/hdjdf1/learning-code" class="btn">前往 GitHub 仓库</a>
    </div>

    <h2>✨ 主要功能</h2>
    <ul>
        <li><strong>自动分类</strong>：根据后缀名将文件移入 Images, Documents, Archives 等文件夹。</li>
        <li><strong>零依赖</strong>：纯原生 Python 代码，开箱即用。</li>
    </ul>

    <h2>🛠️ 如何使用</h2>
    <ol>
        <li>下载 <code>main.py</code> 文件。</li>
        <li>修改代码中的路径为你想要整理的文件夹。</li>
        <li>运行 <code>python main.py</code>。</li>
    </ol>
</body>
</html>
